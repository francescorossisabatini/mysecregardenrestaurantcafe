    <!-- Google Analytics 4 - Deferred, GDPR compliant -->
    <script>
      // Defer analytics to after page load
      window.addEventListener('load', function() {
        var script = document.createElement('script');
        script.src = 'https://www.googletagmanager.com/gtag/js?id=G-NMVX2R7493';
        script.async = true;
        document.head.appendChild(script);
        
        script.onload = function() {
          window.dataLayer = window.dataLayer || [];
          function gtag(){dataLayer.push(arguments);}
          window.gtag = gtag;
          gtag('js', new Date());
          
          // Default: deny analytics until consent is given
          gtag('consent', 'default', {
            'analytics_storage': 'denied'
          });
          
          // Check if user already consented
          if (localStorage.getItem('cookie_consent') === 'accepted') {
            gtag('consent', 'update', { 'analytics_storage': 'granted' });
          }
          
          gtag('config', 'G-NMVX2R7493');
        };
      });
    </script>
